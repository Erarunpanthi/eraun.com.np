<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .bounce {
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .url-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            word-break: break-all;
            font-size: 14px;
            color: #667eea;
            margin: 20px 0;
            border-left: 4px solid #667eea;
            max-height: 200px;
            overflow-y: auto;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin: 10px 5px;
            transition: transform 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #666;
        }
        .error-icon {
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .code-display {
            background: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            margin: 15px 0;
            border: 2px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="icon bounce">🔍</div>
        <h2>Loading...</h2>
        <p>Fetching your link from cloud database</p>
        <div class="loader"></div>
    </div>

    <script>
        // JSONBin Configuration - PUBLIC CLOUD DATABASE
        const JSONBIN_CONFIG = {
            apiKey: '$2a$10$LvIsdjR2wQQMRq28tc2rh.yR1nccP5HIYYrKCSFMRoYMTIrqjRwM6',
            binId: '6a4e14eeda38895dfe3f6860'
        };

        // Start when page loads
        window.addEventListener('load', function() {
            initRedirect();
        });

        function initRedirect() {
            const hash = window.location.hash.substring(1);
            const content = document.getElementById('content');
            
            console.log('🔗 Redirect Page Loaded');
            console.log('📍 Short Code:', hash);
            
            if (!content) {
                console.error('❌ Content element missing');
                return;
            }

            // Validate short code format
            if (!hash || hash.length !== 6 || !/^[a-zA-Z0-9]{6}$/.test(hash)) {
                showInvalidCode(content, hash);
                return;
            }

            // ALWAYS check JSONBin first (not localStorage)
            // This ensures URLs work for everyone globally
            fetchFromJSONBin(content, hash);
        }

        async function fetchFromJSONBin(content, hash) {
            try {
                console.log('🌐 Fetching from JSONBin (Cloud Database)...');
                
                const apiUrl = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`;
                console.log('📡 API URL:', apiUrl);

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.apiKey
                    }
                });

                console.log('📊 Response Status:', response.status);

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const urlDatabase = data.record || {};
                
                console.log('📦 Total URLs in Database:', Object.keys(urlDatabase).length);
                console.log('🔍 Looking for code:', hash);
                console.log('📋 Available codes:', Object.keys(urlDatabase));

                if (urlDatabase[hash]) {
                    console.log('✅ URL FOUND in Cloud Database!');
                    console.log('🎯 Destination:', urlDatabase[hash].longUrl);
                    
                    // Increment click count
                    urlDatabase[hash].clicks = (urlDatabase[hash].clicks || 0) + 1;
                    console.log('👆 Click count:', urlDatabase[hash].clicks);
                    
                    // Update click count in background (don't wait)
                    updateClickCount(urlDatabase);
                    
                    // Redirect to destination
                    redirectToUrl(content, hash, urlDatabase[hash].longUrl);
                } else {
                    console.log('❌ Code NOT FOUND in database');
                    showNotFound(content, hash);
                }

            } catch (error) {
                console.error('❌ JSONBin Error:', error);
                showError(content, hash, error.message);
            }
        }

        async function updateClickCount(urlDatabase) {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_CONFIG.apiKey
                    },
                    body: JSON.stringify(urlDatabase)
                });
                
                if (response.ok) {
                    console.log('✅ Click count updated');
                } else {
                    console.warn('⚠️ Click count update failed');
                }
            } catch (e) {
                console.warn('⚠️ Click count error:', e);
            }
        }

        function redirectToUrl(content, code, longUrl) {
            content.innerHTML = `
                <div class="icon bounce">🚀</div>
                <h2>Redirecting...</h2>
                <p>Taking you to your destination</p>
                <div class="url-box">${escapeHtml(longUrl)}</div>
                <div class="loader"></div>
                <p style="font-size: 12px; color: #999; margin-top: 20px;">
                    ✅ Link verified from cloud database<br>
                    Redirecting in 1 second...
                </p>
            `;

            console.log('🚀 Redirecting to:', longUrl);
            
            setTimeout(() => {
                window.location.href = longUrl;
            }, 1000);
        }

        function showNotFound(content, hash) {
            content.innerHTML = `
                <div class="icon error-icon">❌</div>
                <h2>Link Not Found</h2>
                <p>This short code does not exist in the global database.</p>
                <div class="code-display">Code: ${escapeHtml(hash)}</div>
                <p style="font-size: 14px; color: #999; margin: 20px 0;">
                    <strong>This code was checked in the cloud database</strong><br><br>
                    Possible reasons:<br>
                    • The short code doesn't exist<br>
                    • The link was never created<br>
                    • The code was typed incorrectly
                </p>
                <a href="/url-shortener/" class="btn">🔗 Create a Short URL</a>
            `;
        }

        function showInvalidCode(content, hash) {
            content.innerHTML = `
                <div class="icon error-icon">⚠️</div>
                <h2>Invalid Short Code</h2>
                <p>The URL format is incorrect.</p>
                <div class="code-display">Received: ${escapeHtml(hash || '(empty)')}</div>
                <p style="font-size: 14px; color: #999;">
                    Short codes must be exactly 6 alphanumeric characters.<br>
                    Example: <code>https://arunpanthi.com.np/s#abc123</code>
                </p>
                <a href="/url-shortener/" class="btn">🔗 Go to URL Shortener</a>
            `;
        }

        function showError(content, hash, message) {
            content.innerHTML = `
                <div class="icon error-icon">🔥</div>
                <h2>Connection Error</h2>
                <p>Could not connect to the cloud database.</p>
                <div class="code-display">Error: ${escapeHtml(message)}</div>
                <p style="font-size: 14px; color: #999; margin: 20px 0;">
                    Please check your internet connection and try again.
                </p>
                <button onclick="location.reload()" class="btn">🔄 Retry</button>
                <a href="/url-shortener/" class="btn btn-secondary">🏠 Go Home</a>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
