<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer — Focus Session</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-2: #222222;
            --text: #f0f0f0;
            --text-secondary: #a0a0a0;
            --accent: #ff6b6b;
            --accent-work: #ff6b6b;
            --accent-break: #4ecdc4;
            --accent-long-break: #5b8def;
            --ring-bg: #2a2a2a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(255, 107, 107, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(78, 205, 196, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 60%, rgba(91, 141, 239, 0.04) 0%, transparent 60%);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            opacity: 0.85;
            letter-spacing: -0.02em;
        }
        .header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-work);
            box-shadow: 0 0 12px var(--accent-work);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 8px var(--accent-work);
            }
            50% {
                box-shadow: 0 0 20px var(--accent-work), 0 0 36px rgba(255, 107, 107, 0.5);
            }
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
        }
        .timer-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 2.5rem 2rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
            width: 100%;
            backdrop-filter: blur(10px);
            position: relative;
            transition: all var(--transition);
        }
        .ring-container {
            position: relative;
            width: 260px;
            height: 260px;
        }
        .ring-container svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .ring-bg {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 6;
        }
        .ring-progress {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear, stroke var(--transition);
        }
        .ring-glow {
            fill: none;
            stroke: var(--accent);
            stroke-width: 12;
            stroke-linecap: round;
            opacity: 0.15;
            filter: blur(8px);
            transition: stroke-dashoffset 0.5s linear, stroke var(--transition);
        }
        .timer-display {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .time {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            color: var(--text);
            line-height: 1;
            transition: color var(--transition);
        }
        .time.paused {
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .time.auto-paused-indicator {
            animation: subtle-blink 2s ease-in-out infinite;
        }
        @keyframes subtle-blink {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 0.45;
            }
        }
        .session-label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            transition: color var(--transition);
        }
        .mode-tabs {
            display: flex;
            gap: 0.4rem;
            background: var(--surface-2);
            border-radius: 40px;
            padding: 0.35rem;
            width: 100%;
            max-width: 380px;
        }
        .mode-tab {
            flex: 1;
            padding: 0.7rem 0.6rem;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }
        .mode-tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
        }
        .mode-tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .mode-tab.active[data-mode="work"] {
            background: var(--accent-work);
        }
        .mode-tab.active[data-mode="short-break"] {
            background: var(--accent-break);
            color: #1a1a1a;
        }
        .mode-tab.active[data-mode="long-break"] {
            background: var(--accent-long-break);
            color: #1a1a1a;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-family: inherit;
            outline: none;
        }
        .btn-play {
            width: 68px;
            height: 68px;
            background: var(--accent);
            color: #fff;
            font-size: 1.6rem;
            box-shadow: 0 8px 28px rgba(255, 107, 107, 0.35);
        }
        .btn-play:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 36px rgba(255, 107, 107, 0.45);
        }
        .btn-play:active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(255, 107, 107, 0.3);
        }
        .btn-play.running {
            background: #3a3a3a;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            color: #ccc;
        }
        .btn-play.running:hover {
            background: #4a4a4a;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .btn-secondary {
            width: 44px;
            height: 44px;
            background: var(--surface-2);
            color: var(--text-secondary);
            font-size: 1rem;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-secondary:hover {
            background: #333;
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-secondary:active {
            transform: scale(0.93);
        }
        .session-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            flex-wrap: wrap;
            justify-content: center;
        }
        .session-dots {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }
        .session-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ring-bg);
            transition: all var(--transition);
        }
        .session-dot.completed {
            background: var(--accent-work);
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
        }
        .session-dot.current {
            background: var(--accent-work);
            box-shadow: 0 0 14px rgba(255, 107, 107, 0.7);
            animation: pulse-dot-sm 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot-sm {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
            }
            50% {
                box-shadow: 0 0 18px rgba(255, 107, 107, 0.9);
            }
        }
        .session-settings {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--surface-2);
            border-radius: 20px;
            padding: 0.25rem 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .session-settings label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }
        .session-input {
            width: 40px;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            text-align: center;
            font-weight: 600;
            outline: none;
            padding: 0.2rem;
        }
        .session-input::-webkit-inner-spin-button,
        .session-input::-webkit-outer-spin-button {
            opacity: 0.6;
        }
        .session-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            padding: 0 0.15rem;
            transition: color var(--transition);
        }
        .session-btn:hover {
            color: var(--text);
        }
        .total-timer-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            justify-content: center;
            padding-top: 0.6rem;
            margin-top: 0.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            width: 100%;
        }
        .total-timer-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
            background: var(--surface-2);
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all var(--transition);
        }
        .total-timer-item .tt-icon {
            font-size: 0.85rem;
        }
        .total-timer-item .tt-value {
            font-weight: 600;
            color: #d0d0d0;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            letter-spacing: -0.02em;
        }
        .total-timer-item.focus-total .tt-icon {
            color: var(--accent-work);
        }
        .total-timer-item.break-total .tt-icon {
            color: var(--accent-break);
        }
        .total-timer-item.total-sum {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: default;
        }
        .total-timer-item.total-sum .tt-value {
            color: #fff;
            font-weight: 700;
        }
        .total-timer-reset,
        .btn-report {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            transition: all var(--transition);
            white-space: nowrap;
            opacity: 0.6;
            font-family: inherit;
        }
        .total-timer-reset:hover,
        .btn-report:hover {
            opacity: 1;
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.08);
        }
        .btn-report {
            background: rgba(255, 255, 255, 0.03);
            margin-left: 0.2rem;
        }
        .toast {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--surface-2);
            color: var(--text);
            padding: 0.9rem 1.6rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.break-toast {
            border-color: rgba(78, 205, 196, 0.4);
            background: #1a2a28;
        }

        /* ----- Report Modal (Excel-like) ----- */
        .report-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: fadeIn 0.25s ease;
        }
        .report-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .report-modal {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            max-width: 920px;
            width: 100%;
            max-height: 90vh;
            padding: 1.8rem 1.8rem 1.5rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .report-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .report-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .report-header h2 span {
            color: var(--accent-work);
        }
        .report-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .report-actions button {
            background: var(--surface-2);
            border: none;
            color: var(--text-secondary);
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .report-actions button:hover {
            background: #333;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }
        .report-actions .close-btn {
            background: transparent;
            font-size: 1.3rem;
            padding: 0 0.6rem;
            border: none;
            color: var(--text-secondary);
        }
        .report-actions .close-btn:hover {
            color: #ff6b6b;
            background: transparent;
        }
        .report-scroll {
            overflow-y: auto;
            flex: 1;
            padding-right: 0.2rem;
        }
        .report-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .report-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .report-scroll::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        .report-table-wrap {
            overflow-x: auto;
            margin-bottom: 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            min-width: 420px;
        }
        .report-table th {
            background: var(--surface-2);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 0.68rem;
            padding: 0.7rem 0.9rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .report-table td {
            padding: 0.6rem 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #ddd;
            font-variant-numeric: tabular-nums;
        }
        .report-table tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }
        .report-table .total-row td {
            background: rgba(255, 107, 107, 0.06);
            font-weight: 600;
            color: #fff;
            border-top: 2px solid rgba(255, 107, 107, 0.25);
        }
        .report-table .focus-col {
            color: var(--accent-work);
        }
        .report-table .break-col {
            color: var(--accent-break);
        }
        .report-chart-wrap {
            background: var(--surface-2);
            border-radius: 12px;
            padding: 1rem 0.5rem 0.3rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 0.2rem;
        }
        .report-chart-wrap canvas {
            width: 100% !important;
            height: auto !important;
            max-height: 200px;
            display: block;
            border-radius: 6px;
        }
        .report-empty {
            text-align: center;
            padding: 2.5rem 0;
            color: var(--text-secondary);
        }
        .report-empty .big-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.8rem;
            opacity: 0.4;
        }
        .report-empty p {
            font-size: 0.9rem;
        }

        @media(max-width:480px) {
            .container {
                padding: 1rem;
                gap: 1.5rem;
            }
            .timer-card {
                padding: 1.8rem 1.2rem 1.5rem;
                gap: 1.4rem;
                border-radius: 20px;
            }
            .ring-container {
                width: 210px;
                height: 210px;
            }
            .time {
                font-size: 3.2rem;
            }
            .btn-play {
                width: 58px;
                height: 58px;
                font-size: 1.3rem;
            }
            .btn-secondary {
                width: 38px;
                height: 38px;
                font-size: 0.85rem;
            }
            .mode-tab {
                font-size: 0.7rem;
                padding: 0.55rem 0.35rem;
            }
            .session-label {
                font-size: 0.7rem;
            }
            .session-settings {
                padding: 0.2rem 0.4rem;
            }
            .total-timer-section {
                gap: 0.5rem;
                font-size: 0.68rem;
            }
            .total-timer-item {
                padding: 0.28rem 0.5rem;
            }
            .report-modal {
                padding: 1rem;
                max-height: 95vh;
            }
            .report-table {
                font-size: 0.7rem;
                min-width: 320px;
            }
            .report-table th,
            .report-table td {
                padding: 0.4rem 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="dot"></div>
            <h1>Pomodoro</h1>
        </div>

        <div class="timer-card" id="timerCard">
            <div class="ring-container">
                <svg viewBox="0 0 260 260">
                    <circle class="ring-bg" cx="130" cy="130" r="120"/>
                    <circle class="ring-glow" cx="130" cy="130" r="120" stroke-dasharray="753.98" stroke-dashoffset="0" id="ringGlow"/>
                    <circle class="ring-progress" cx="130" cy="130" r="120" stroke-dasharray="753.98" stroke-dashoffset="0" id="ringProgress"/>
                </svg>
                <div class="timer-display">
                    <span class="time" id="timeDisplay">25:00</span>
                    <span class="session-label" id="sessionLabel">Focus</span>
                </div>
            </div>

            <div class="mode-tabs" id="modeTabs">
                <button class="mode-tab active" data-mode="work" data-duration="25">Focus</button>
                <button class="mode-tab" data-mode="short-break" data-duration="5">Short Break</button>
                <button class="mode-tab" data-mode="long-break" data-duration="15">Long Break</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btnReset" title="Reset">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
                <button class="btn btn-play" id="btnPlay">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iconPlay"><polygon points="6,3 20,12 6,21"/></svg>
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="iconPause" style="display:none;"><rect x="4" y="3" width="6" height="18" rx="1.5"/><rect x="14" y="3" width="6" height="18" rx="1.5"/></svg>
                </button>
                <button class="btn btn-secondary" id="btnSkip" title="Skip">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
            </div>

            <div class="session-info">
                <span>Sessions</span>
                <div class="session-dots" id="sessionDots"></div>
                <span id="sessionCount">0 / 4</span>
                <div class="session-settings">
                    <label for="sessionInput">🔁</label>
                    <button class="session-btn" id="sessionDecrement">−</button>
                    <input type="number" id="sessionInput" class="session-input" value="4" min="1" max="10" step="1">
                    <button class="session-btn" id="sessionIncrement">+</button>
                </div>
            </div>

            <div class="total-timer-section">
                <span style="opacity:0.6;font-size:0.7rem;">Today</span>
                <div class="total-timer-item focus-total"><span class="tt-icon">⏱</span><span class="tt-label">Focus</span><span class="tt-value" id="totalFocusDisplay">0m</span></div>
                <div class="total-timer-item break-total"><span class="tt-icon">☕</span><span class="tt-label">Break</span><span class="tt-value" id="totalBreakDisplay">0m</span></div>
                <div class="total-timer-item total-sum" title="Total combined time"><span class="tt-icon">⏳</span><span class="tt-label">Total</span><span class="tt-value" id="totalHoursValue">0.0h</span></div>
                <button class="total-timer-reset" id="totalTimerReset">↺</button>
                <button class="btn-report" id="btnReport">📊 Report</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Report Overlay -->
    <div class="report-overlay" id="reportOverlay">
        <div class="report-modal">
            <div class="report-header">
                <h2>📊 <span>Pomodoro</span> Daily Log</h2>
                <div class="report-actions">
                    <button id="exportCsvBtn">⬇ CSV</button>
                    <button id="reportCloseBtn" class="close-btn">✕</button>
                </div>
            </div>
            <div class="report-scroll" id="reportScroll">
                <div id="reportContent">
                    <!-- dynamically filled -->
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---- DOM refs ----
            const timeDisplay = document.getElementById('timeDisplay');
            const sessionLabel = document.getElementById('sessionLabel');
            const ringProgress = document.getElementById('ringProgress');
            const ringGlow = document.getElementById('ringGlow');
            const btnPlay = document.getElementById('btnPlay');
            const btnReset = document.getElementById('btnReset');
            const btnSkip = document.getElementById('btnSkip');
            const iconPlay = document.getElementById('iconPlay');
            const iconPause = document.getElementById('iconPause');
            const modeTabs = document.getElementById('modeTabs');
            const sessionDotsContainer = document.getElementById('sessionDots');
            const sessionCount = document.getElementById('sessionCount');
            const toast = document.getElementById('toast');
            const sessionInput = document.getElementById('sessionInput');
            const sessionDecrement = document.getElementById('sessionDecrement');
            const sessionIncrement = document.getElementById('sessionIncrement');
            const totalFocusDisplay = document.getElementById('totalFocusDisplay');
            const totalBreakDisplay = document.getElementById('totalBreakDisplay');
            const totalHoursValue = document.getElementById('totalHoursValue');
            const totalTimerReset = document.getElementById('totalTimerReset');
            const btnReport = document.getElementById('btnReport');
            const reportOverlay = document.getElementById('reportOverlay');
            const reportContent = document.getElementById('reportContent');
            const reportCloseBtn = document.getElementById('reportCloseBtn');
            const exportCsvBtn = document.getElementById('exportCsvBtn');

            const CIRCUMFERENCE = 2 * Math.PI * 120;
            ringProgress.style.strokeDasharray = CIRCUMFERENCE;
            ringGlow.style.strokeDasharray = CIRCUMFERENCE;
            ringProgress.style.strokeDashoffset = '0';
            ringGlow.style.strokeDashoffset = '0';

            // ---- Audio ----
            let audioCtx = null;

            function getAudioContext() {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx;
            }

            function playTone(f, d, type = 'sine', vol = 0.3, ramp = true) {
                try {
                    const ctx = getAudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(f, ctx.currentTime);
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    if (ramp) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
                    else gain.gain.setValueAtTime(0, ctx.currentTime + d);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + d);
                } catch (e) {}
            }

            function playStartSound() {
                const ctx = getAudioContext();
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const osc = ctx.createOscillator(),
                        gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
                    gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.35);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + i * 0.12);
                    osc.stop(ctx.currentTime + i * 0.12 + 0.4);
                });
                playTone(80, 0.5, 'sine', 0.2);
            }

            function playEndSound() {
                const ctx = getAudioContext();
                [880, 1046.5].forEach((f, i) => {
                    const osc = ctx.createOscillator(),
                        gain = ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.18);
                    gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.18);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + i * 0.18);
                    osc.stop(ctx.currentTime + i * 0.18 + 0.55);
                });
                setTimeout(() => playTone(1200, 0.6, 'sine', 0.2), 400);
            }

            function playClickSound() { playTone(600, 0.08, 'sine', 0.15, false); }

            function playSkipSound() { playTone(400, 0.12, 'square', 0.08, false); }

            // ---- Wake Lock ----
            let wakeLockSentinel = null;

            async function requestWakeLock() {
                if (!('wakeLock' in navigator)) return;
                try {
                    wakeLockSentinel = await navigator.wakeLock.request('screen');
                    wakeLockSentinel.addEventListener('release', () => wakeLockSentinel = null);
                } catch (e) {}
            }

            async function releaseWakeLock() {
                if (wakeLockSentinel) {
                    try { await wakeLockSentinel.release(); } catch (e) {}
                    wakeLockSentinel = null;
                }
            }

            // ---- State ----
            const MODES = {
                work: { label: 'Focus', duration: 25 * 60, accent: '#ff6b6b' },
                'short-break': { label: 'Short Break', duration: 5 * 60, accent: '#4ecdc4' },
                'long-break': { label: 'Long Break', duration: 15 * 60, accent: '#5b8def' }
            };
            let currentMode = 'work',
                totalSeconds = MODES.work.duration,
                remainingSeconds = totalSeconds,
                timerInterval = null,
                isRunning = false;
            let completedWorkSessions = 0,
                MAX_WORK_SESSIONS = 4,
                wasAutoPaused = false;
            let totalFocusSeconds = 0,
                totalBreakSeconds = 0,
                inactivityTimeout = null;

            // ---- Storage helpers ----
            function getTodayDateString() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }

            function getStorageKey() { return `pomodoro-totals-${getTodayDateString()}`; }

            function loadTotalsFromStorage() {
                try {
                    const key = getStorageKey();
                    const raw = localStorage.getItem(key);
                    if (raw) {
                        const data = JSON.parse(raw);
                        totalFocusSeconds = Math.max(0, parseInt(data.focus, 10) || 0);
                        totalBreakSeconds = Math.max(0, parseInt(data.break, 10) || 0);
                    } else {
                        totalFocusSeconds = 0;
                        totalBreakSeconds = 0;
                    }
                } catch (e) {
                    totalFocusSeconds = 0;
                    totalBreakSeconds = 0;
                }
                // ensure we save right away so today's entry exists
                saveTotalsToStorage();
            }

            function saveTotalsToStorage() {
                try {
                    localStorage.setItem(getStorageKey(), JSON.stringify({
                        focus: totalFocusSeconds,
                        break: totalBreakSeconds
                    }));
                } catch (e) {}
            }

            function resetTodayTotals() {
                totalFocusSeconds = 0;
                totalBreakSeconds = 0;
                saveTotalsToStorage();
                updateTotalTimerDisplay();
                showToast('Today\'s totals reset');
            }

            // ---- Formatting ----
            function formatTime(sec) {
                const m = Math.floor(sec / 60),
                    s = sec % 60;
                return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }

            function formatMinutes(sec) { return `${Math.round(sec/60)}m`; }

            function formatHours(sec) { return (sec / 3600).toFixed(1) + 'h'; }

            function formatHoursShort(sec) {
                const h = Math.floor(sec / 3600);
                const m = Math.round((sec % 3600) / 60);
                if (h === 0) return `${m}m`;
                return `${h}h ${m}m`;
            }

            // ---- UI updates ----
            function updateTotalTimerDisplay() {
                totalFocusDisplay.textContent = formatMinutes(totalFocusSeconds);
                totalBreakDisplay.textContent = formatMinutes(totalBreakSeconds);
                totalHoursValue.textContent = formatHours(totalFocusSeconds + totalBreakSeconds);
            }

            function updateTitle() {
                const paused = (!isRunning && remainingSeconds < totalSeconds) ? ' ⏸' : '';
                document.title = `${formatTime(remainingSeconds)} - ${MODES[currentMode].label}${paused}`;
            }

            function updateDisplay() {
                timeDisplay.textContent = formatTime(remainingSeconds);
                const fraction = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
                const offset = CIRCUMFERENCE * (1 - fraction);
                ringProgress.style.strokeDashoffset = offset;
                ringGlow.style.strokeDashoffset = offset;
                timeDisplay.classList.remove('paused', 'auto-paused-indicator');
                if (!isRunning && remainingSeconds < totalSeconds) {
                    timeDisplay.classList.add(wasAutoPaused ? 'auto-paused-indicator' : 'paused');
                }
                updateTitle();
                updateTotalTimerDisplay();
            }

            function setAccent(color) {
                document.documentElement.style.setProperty('--accent', color);
                ringProgress.style.stroke = color;
                ringGlow.style.stroke = color;
                btnPlay.style.background = isRunning ? '#3a3a3a' : color;
                if (!isRunning) btnPlay.style.boxShadow = `0 8px 28px ${color}55`;
                document.querySelector('.header .dot').style.background = color;
                document.querySelector('.header .dot').style.boxShadow = `0 0 12px ${color}`;
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.mode === currentMode);
                });
                updateTitle();
            }

            function renderSessionDots() {
                sessionDotsContainer.innerHTML = '';
                for (let i = 0; i < MAX_WORK_SESSIONS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'session-dot';
                    if (i < completedWorkSessions) dot.classList.add('completed');
                    if (currentMode === 'work' && isRunning && i === completedWorkSessions && completedWorkSessions <
                        MAX_WORK_SESSIONS) dot.classList.add('current');
                    sessionDotsContainer.appendChild(dot);
                }
                sessionCount.textContent = `${completedWorkSessions} / ${MAX_WORK_SESSIONS}`;
            }

            function updateSessionDots() {
                if (sessionDotsContainer.children.length !== MAX_WORK_SESSIONS) { renderSessionDots(); return; }
                [...sessionDotsContainer.children].forEach((dot, i) => {
                    dot.classList.remove('completed', 'current');
                    if (i < completedWorkSessions) dot.classList.add('completed');
                    if (currentMode === 'work' && isRunning && i === completedWorkSessions && completedWorkSessions <
                        MAX_WORK_SESSIONS) dot.classList.add('current');
                });
                sessionCount.textContent = `${completedWorkSessions} / ${MAX_WORK_SESSIONS}`;
            }

            function handleSessionCountChange(val) {
                const parsed = parseInt(val, 10);
                if (isNaN(parsed) || parsed < 1) MAX_WORK_SESSIONS = 1;
                else if (parsed > 500) MAX_WORK_SESSIONS = 500;
                else MAX_WORK_SESSIONS = parsed;
                if (completedWorkSessions > MAX_WORK_SESSIONS) completedWorkSessions = MAX_WORK_SESSIONS;
                sessionInput.value = MAX_WORK_SESSIONS;
                renderSessionDots();
                updateTitle();
            }

            function showToast(msg, isBreak = false) {
                toast.textContent = msg;
                toast.className = 'toast' + (isBreak ? ' break-toast' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            function clearAutoPausedFlag() {
                if (wasAutoPaused) { wasAutoPaused = false;
                    timeDisplay.classList.remove('auto-paused-indicator'); }
            }

            function clearInactivityTimeout() {
                if (inactivityTimeout) { clearTimeout(inactivityTimeout);
                    inactivityTimeout = null; }
            }

            // ---- Timer controls ----
            function stopTimer(keepWakeLock = false) {
                if (timerInterval) { clearInterval(timerInterval);
                    timerInterval = null; }
                isRunning = false;
                clearAutoPausedFlag();
                clearInactivityTimeout();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                btnPlay.classList.remove('running');
                btnPlay.style.background = MODES[currentMode].accent;
                btnPlay.style.boxShadow = `0 8px 28px ${MODES[currentMode].accent}55`;
                updateDisplay();
                updateSessionDots();
                if (!keepWakeLock) releaseWakeLock();
                saveTotalsToStorage();
            }

            function resetTimer() {
                stopTimer();
                remainingSeconds = MODES[currentMode].duration;
                totalSeconds = remainingSeconds;
                clearAutoPausedFlag();
                updateDisplay();
                updateSessionDots();
                timeDisplay.classList.remove('paused', 'auto-paused-indicator');
            }

            function switchMode(mode) {
                if (isRunning) stopTimer();
                clearAutoPausedFlag();
                currentMode = mode;
                totalSeconds = MODES[mode].duration;
                remainingSeconds = totalSeconds;
                sessionLabel.textContent = MODES[mode].label;
                setAccent(MODES[mode].accent);
                updateDisplay();
                updateSessionDots();
                timeDisplay.classList.remove('paused', 'auto-paused-indicator');
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
                saveTotalsToStorage();
            }

            function startTimer() {
                if (isRunning) return;
                if (remainingSeconds <= 0) { remainingSeconds = MODES[currentMode].duration;
                    totalSeconds = remainingSeconds; }
                totalSeconds = MODES[currentMode].duration;
                clearAutoPausedFlag();
                clearInactivityTimeout();
                getAudioContext();
                isRunning = true;
                iconPlay.style.display = 'none';
                iconPause.style.display = 'block';
                btnPlay.classList.add('running');
                btnPlay.style.background = '#3a3a3a';
                btnPlay.style.boxShadow = '0 4px 16px rgba(0,0,0,0.3)';
                timeDisplay.classList.remove('paused', 'auto-paused-indicator');
                updateSessionDots();
                updateTitle();
                playStartSound();
                requestWakeLock();
                showToast(`${MODES[currentMode].label} session started · ${formatTime(remainingSeconds)}`, currentMode !==
                    'work');

                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    updateDisplay();
                    if (currentMode === 'work') totalFocusSeconds++;
                    else totalBreakSeconds++;
                    saveTotalsToStorage();

                    if (remainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        isRunning = false;
                        clearAutoPausedFlag();
                        clearInactivityTimeout();
                        iconPlay.style.display = 'block';
                        iconPause.style.display = 'none';
                        btnPlay.classList.remove('running');
                        btnPlay.style.background = MODES[currentMode].accent;
                        btnPlay.style.boxShadow = `0 8px 28px ${MODES[currentMode].accent}55`;
                        updateDisplay();
                        releaseWakeLock();
                        saveTotalsToStorage();
                        playEndSound();

                        if (currentMode === 'work') {
                            completedWorkSessions++;
                            updateSessionDots();
                            showToast('🎉 Focus complete! Take a break.', true);
                            if (completedWorkSessions >= MAX_WORK_SESSIONS) {
                                completedWorkSessions = 0;
                                updateSessionDots();
                                switchMode('long-break');
                                showToast('Great work! Long break ☕', true);
                            } else {
                                switchMode('short-break');
                            }
                        } else {
                            showToast('Break over! Ready to focus?', false);
                            switchMode('work');
                            updateSessionDots();
                        }
                        setTimeout(() => {
                            if (!isRunning && remainingSeconds === MODES[currentMode].duration) {
                                startTimer();
                            }
                        }, currentMode === 'work' ? 1500 : 1800);
                    }
                }, 1000);
            }

            function pauseTimer(triggeredByTabSwitch = false) {
                if (!isRunning) return;
                clearInterval(timerInterval);
                timerInterval = null;
                isRunning = false;
                clearInactivityTimeout();
                iconPlay.style.display = 'block';
                iconPause.style.display = 'none';
                btnPlay.classList.remove('running');
                btnPlay.style.background = MODES[currentMode].accent;
                btnPlay.style.boxShadow = `0 8px 28px ${MODES[currentMode].accent}55`;
                updateDisplay();
                updateSessionDots();
                if (triggeredByTabSwitch) {
                    wasAutoPaused = true;
                    timeDisplay.classList.add('auto-paused-indicator');
                } else {
                    timeDisplay.classList.add('paused');
                }
                releaseWakeLock();
                saveTotalsToStorage();
            }

            function skipSession() {
                playSkipSound();
                if (isRunning) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    isRunning = false;
                    iconPlay.style.display = 'block';
                    iconPause.style.display = 'none';
                    btnPlay.classList.remove('running');
                    releaseWakeLock();
                }
                clearAutoPausedFlag();
                clearInactivityTimeout();
                remainingSeconds = 0;
                updateDisplay();
                saveTotalsToStorage();

                if (currentMode === 'work') {
                    completedWorkSessions++;
                    updateSessionDots();
                    showToast('Focus skipped · Take a break', true);
                    if (completedWorkSessions >= MAX_WORK_SESSIONS) {
                        completedWorkSessions = 0;
                        updateSessionDots();
                        switchMode('long-break');
                    } else {
                        switchMode('short-break');
                    }
                } else {
                    showToast('Break skipped · Back to focus', false);
                    switchMode('work');
                }
                updateSessionDots();
                btnPlay.style.background = MODES[currentMode].accent;
                btnPlay.style.boxShadow = `0 8px 28px ${MODES[currentMode].accent}55`;
                timeDisplay.classList.remove('paused', 'auto-paused-indicator');
            }

            // ---- Visibility with 10-sec grace ----
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState === 'hidden' && isRunning) {
                    clearInactivityTimeout();
                    inactivityTimeout = setTimeout(() => {
                        if (isRunning) pauseTimer(true);
                        inactivityTimeout = null;
                    }, 10000);
                }
                if (document.visibilityState === 'visible') {
                    if (inactivityTimeout) { clearTimeout(inactivityTimeout);
                        inactivityTimeout = null; }
                    if (wasAutoPaused && !isRunning && remainingSeconds > 0 && remainingSeconds < totalSeconds) {
                        startTimer();
                    }
                    if (isRunning && !wakeLockSentinel) await requestWakeLock();
                    // ensure today's data is loaded
                    loadTotalsFromStorage();
                    updateTotalTimerDisplay();
                }
            });

            // ---- Report: Excel-like table + bar chart (from today onward) ----
            function buildReport() {
                const historyData = [];
                const today = getTodayDateString();

                // Collect all stored days
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('pomodoro-totals-')) {
                        const dateStr = key.replace('pomodoro-totals-', '');
                        // Only include dates from today onward
                        if (dateStr < today) return;
                        try {
                            const raw = localStorage.getItem(key);
                            const data = JSON.parse(raw);
                            const focusSec = parseInt(data.focus, 10) || 0;
                            const breakSec = parseInt(data.break, 10) || 0;
                            const totalSec = focusSec + breakSec;
                            if (totalSec > 0 || dateStr === today) {
                                historyData.push({ dateStr, focusSec, breakSec, totalSec });
                            }
                        } catch (e) {}
                    }
                });

                // Sort by date ascending
                historyData.sort((a, b) => a.dateStr.localeCompare(b.dateStr));

                // Build table rows
                let html = '';
                if (historyData.length === 0) {
                    html = `
                        <div class="report-empty">
                            <span class="big-icon">📭</span>
                            <p>No data recorded yet from today onward.<br>Start using the timer to build your log!</p>
                        </div>
                    `;
                } else {
                    let totalFocusAll = 0,
                        totalBreakAll = 0;
                    const rows = historyData.map((entry, idx) => {
                        totalFocusAll += entry.focusSec;
                        totalBreakAll += entry.breakSec;
                        const [y, m, d] = entry.dateStr.split('-').map(Number);
                        const adDate = new Date(y, m - 1, d);
                        const displayDate = adDate.toLocaleDateString('en-US', {
                            weekday: 'short',
                            month: 'short',
                            day: 'numeric',
                            year: 'numeric'
                        });
                        const focusH = (entry.focusSec / 3600).toFixed(1);
                        const breakH = (entry.breakSec / 3600).toFixed(1);
                        const totalH = (entry.totalSec / 3600).toFixed(1);
                        return { idx, dateStr: entry.dateStr, displayDate, focusSec: entry.focusSec,
                            breakSec: entry.breakSec, totalSec: entry.totalSec, focusH, breakH, totalH };
                    });

                    html += `
                        <div class="report-table-wrap">
                            <table class="report-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th style="text-align:right;">Focus (hr)</th>
                                        <th style="text-align:right;">Break (hr)</th>
                                        <th style="text-align:right;">Total (hr)</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    rows.forEach((r, i) => {
                        html += `
                            <tr>
                                <td>${i+1}</td>
                                <td>${r.displayDate}</td>
                                <td class="focus-col" style="text-align:right;">${r.focusH}</td>
                                <td class="break-col" style="text-align:right;">${r.breakH}</td>
                                <td style="text-align:right;font-weight:500;">${r.totalH}</td>
                            </tr>
                        `;
                    });
                    // Grand total row
                    const grandFocus = (totalFocusAll / 3600).toFixed(1);
                    const grandBreak = (totalBreakAll / 3600).toFixed(1);
                    const grandTotal = ((totalFocusAll + totalBreakAll) / 3600).toFixed(1);
                    html += `
                                <tr class="total-row">
                                    <td colspan="2" style="font-weight:600;">📊 Grand Total</td>
                                    <td class="focus-col" style="text-align:right;font-weight:600;">${grandFocus}</td>
                                    <td class="break-col" style="text-align:right;font-weight:600;">${grandBreak}</td>
                                    <td style="text-align:right;font-weight:700;">${grandTotal}</td>
                                </tr>
                            </tbody></table>
                        </div>
                    `;

                    // ---- Bar chart (from today onward) ----
                    const chartLabels = rows.map(r => {
                        const parts = r.dateStr.split('-');
                        return `${parts[1]}/${parts[2]}`;
                    });
                    const chartFocus = rows.map(r => +(r.focusSec / 3600).toFixed(2));
                    const chartBreak = rows.map(r => +(r.breakSec / 3600).toFixed(2));

                    html += `
                        <div class="report-chart-wrap">
                            <canvas id="reportChart" width="800" height="200"></canvas>
                        </div>
                        <script>
                            (function() {
                                const canvas = document.getElementById('reportChart');
                                if (!canvas) return;
                                const ctx = canvas.getContext('2d');
                                const labels = ${JSON.stringify(chartLabels)};
                                const focusData = ${JSON.stringify(chartFocus)};
                                const breakData = ${JSON.stringify(chartBreak)};

                                const W = canvas.width, H = canvas.height;
                                const pad = { top: 18, bottom: 30, left: 40, right: 16 };
                                const chartW = W - pad.left - pad.right;
                                const chartH = H - pad.top - pad.bottom;
                                const maxVal = Math.max(0.5, ...focusData, ...breakData);
                                const barGap = 6;
                                const groupW = Math.min(48, (chartW - (labels.length-1)*barGap) / labels.length);
                                const barW = groupW * 0.38;

                                ctx.clearRect(0,0,W,H);

                                if (labels.length === 0) return;

                                // grid lines
                                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                                ctx.lineWidth = 1;
                                for (let i=0; i<=4; i++) {
                                    const y = pad.top + chartH - (i/4)*chartH;
                                    ctx.beginPath();
                                    ctx.moveTo(pad.left, y);
                                    ctx.lineTo(W - pad.right, y);
                                    ctx.stroke();
                                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                                    ctx.font = '9px sans-serif';
                                    ctx.textAlign = 'right';
                                    ctx.fillText((maxVal*(i/4)).toFixed(1)+'h', pad.left-6, y+3);
                                }

                                labels.forEach((label, i) => {
                                    const x = pad.left + i * (groupW + barGap) + groupW/2;

                                    // focus bar
                                    const fH = (focusData[i]/maxVal) * chartH;
                                    const fX = x - barW - 2;
                                    const fY = pad.top + chartH - fH;
                                    ctx.fillStyle = '#ff6b6b';
                                    ctx.fillRect(fX, fY, barW, fH);
                                    if (focusData[i] > 0.05) {
                                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                                        ctx.font = '7px sans-serif';
                                        ctx.textAlign = 'center';
                                        ctx.fillText(focusData[i].toFixed(1), fX+barW/2, fY-3);
                                    }

                                    // break bar
                                    const bH = (breakData[i]/maxVal) * chartH;
                                    const bX = x + 2;
                                    const bY = pad.top + chartH - bH;
                                    ctx.fillStyle = '#4ecdc4';
                                    ctx.fillRect(bX, bY, barW, bH);
                                    if (breakData[i] > 0.05) {
                                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                                        ctx.font = '7px sans-serif';
                                        ctx.textAlign = 'center';
                                        ctx.fillText(breakData[i].toFixed(1), bX+barW/2, bY-3);
                                    }

                                    // x label
                                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                                    ctx.font = '8px sans-serif';
                                    ctx.textAlign = 'center';
                                    ctx.fillText(label, x, H - 6);
                                });

                                // legend
                                ctx.font = '8px sans-serif';
                                ctx.fillStyle = '#ff6b6b';
                                ctx.fillRect(W-120, 6, 12, 10);
                                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                                ctx.fillText('Focus', W-104, 15);
                                ctx.fillStyle = '#4ecdc4';
                                ctx.fillRect(W-64, 6, 12, 10);
                                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                                ctx.fillText('Break', W-48, 15);
                            })();
                        <\/script>
                    `;
                }

                reportContent.innerHTML = html;
            }

            // ---- Open / Close Report ----
            function openReport() {
                buildReport();
                reportOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeReport() {
                reportOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            btnReport.addEventListener('click', openReport);
            reportCloseBtn.addEventListener('click', closeReport);
            reportOverlay.addEventListener('click', (e) => {
                if (e.target === reportOverlay) closeReport();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && reportOverlay.classList.contains('open')) closeReport();
            });

            // ---- Export CSV (Excel-like) ----
            exportCsvBtn.addEventListener('click', () => {
                const rows = [];
                const today = getTodayDateString();
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('pomodoro-totals-')) {
                        const dateStr = key.replace('pomodoro-totals-', '');
                        if (dateStr < today) return;
                        try {
                            const raw = localStorage.getItem(key);
                            const data = JSON.parse(raw);
                            const focusSec = parseInt(data.focus, 10) || 0;
                            const breakSec = parseInt(data.break, 10) || 0;
                            if (focusSec > 0 || breakSec > 0 || dateStr === today) {
                                rows.push({ date: dateStr, focus: (focusSec / 3600).toFixed(2),
                                    break: (breakSec / 3600).toFixed(2),
                                    total: ((focusSec + breakSec) / 3600).toFixed(2) });
                            }
                        } catch (e) {}
                    }
                });
                rows.sort((a, b) => a.date.localeCompare(b.date));

                if (rows.length === 0) {
                    showToast('No data to export', false);
                    return;
                }

                let csv = 'Date,Focus (hr),Break (hr),Total (hr)\n';
                rows.forEach(r => {
                    csv += `${r.date},${r.focus},${r.break},${r.total}\n`;
                });
                // grand total
                const totalFocus = rows.reduce((s, r) => s + parseFloat(r.focus), 0);
                const totalBreak = rows.reduce((s, r) => s + parseFloat(r.break), 0);
                csv += `Grand Total,${totalFocus.toFixed(2)},${totalBreak.toFixed(2)},${(totalFocus+totalBreak).toFixed(2)}\n`;

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `pomodoro-log-${today}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);
                showToast('CSV exported 📥', false);
            });

            // ---- Event listeners ----
            btnPlay.addEventListener('click', () => {
                playClickSound();
                isRunning ? pauseTimer(false) : startTimer();
            });
            btnReset.addEventListener('click', () => {
                playClickSound();
                resetTimer();
                showToast('Timer reset');
            });
            btnSkip.addEventListener('click', skipSession);

            modeTabs.addEventListener('click', (e) => {
                const tab = e.target.closest('.mode-tab');
                if (!tab) return;
                if (tab.dataset.mode === currentMode && !isRunning && remainingSeconds === MODES[currentMode]
                    .duration) return;
                playClickSound();
                switchMode(tab.dataset.mode);
                showToast(`Switched to ${MODES[tab.dataset.mode].label.toLowerCase()}`);
            });

            sessionInput.addEventListener('input', e => handleSessionCountChange(e.target.value));
            sessionInput.addEventListener('blur', () => sessionInput.value = MAX_WORK_SESSIONS);
            sessionDecrement.addEventListener('click', () => {
                if (MAX_WORK_SESSIONS > 1) handleSessionCountChange(MAX_WORK_SESSIONS - 1);
            });
            sessionIncrement.addEventListener('click', () => {
                if (MAX_WORK_SESSIONS < 500) handleSessionCountChange(MAX_WORK_SESSIONS + 1);
            });
            totalTimerReset.addEventListener('click', resetTodayTotals);

            // ---- Keyboard shortcuts ----
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (reportOverlay.classList.contains('open')) {
                    if (e.key === 'Escape') closeReport();
                    return;
                }
                switch (e.code) {
                    case 'Space':
                        e.preventDefault();
                        isRunning ? pauseTimer(false) : startTimer();
                        break;
                    case 'KeyR':
                        if (!e.ctrlKey && !e.metaKey) { e.preventDefault();
                            resetTimer(); }
                        break;
                    case 'KeyS':
                        if (!e.ctrlKey && !e.metaKey) { e.preventDefault();
                            skipSession(); }
                        break;
                    case 'Digit1':
                        e.preventDefault();
                        switchMode('work');
                        break;
                    case 'Digit2':
                        e.preventDefault();
                        switchMode('short-break');
                        break;
                    case 'Digit3':
                        e.preventDefault();
                        switchMode('long-break');
                        break;
                }
            });

            // ---- Init ----
            loadTotalsFromStorage();
            setAccent(MODES.work.accent);
            renderSessionDots();
            updateDisplay();
            updateSessionDots();
            updateTotalTimerDisplay();
            sessionLabel.textContent = MODES.work.label;
            sessionInput.value = MAX_WORK_SESSIONS;

            // Rebuild report if it was open on visibility change (keeps data fresh)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && reportOverlay.classList.contains('open')) {
                    buildReport();
                }
            });
        })();
    </script>
</body>
</html>
